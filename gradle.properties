kotlin.code.style=official
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
# Wait longer when another process holds the wrapper distribution lock (parallel IDE + CLI)
org.gradle.wrapper.internal.timeout=600000
# Slow networks: avoid timeouts when fetching dependencies
systemProp.org.gradle.internal.http.connectionTimeout=600000
systemProp.org.gradle.internal.http.socketTimeout=600000
org.jetbrains.compose.experimental.uikit.enabled=false
org.gradle.parallel=true
org.gradle.caching=true
